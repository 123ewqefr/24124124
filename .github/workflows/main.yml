name: Build Minecraft Mod JAR

"on":
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle 7.3
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.3'

      - name: Cache Forge/Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-forge-fg5-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-forge-fg5-

      - name: Build mod JAR
        run: |
          if [ -f "minecraft-credit-mod/build.gradle" ]; then
            cd minecraft-credit-mod
          fi
          gradle build --no-daemon --stacktrace
        env:
          JAVA_TOOL_OPTIONS: "-Xmx3g"

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: creditmod-jar
          path: |
            build/libs/creditmod-1.16.5-*.jar
            minecraft-credit-mod/build/libs/creditmod-1.16.5-*.jar
          if-no-files-found: error
          retention-days: 30
